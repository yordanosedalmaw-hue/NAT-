<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    
   <div class="continer">
    <div class="head">
       <h1><span>ORDERING</span><br>FOODS</h1>
        <div class="menubare">
           
        </div>
        <div class="cart_login">
            <input type="search" placeholder="Search menu" id="search">
            <img src="images/shopping-cart.png" alt="" >
            <button id="login"></button>
        </div>
        <div class="languge">
        <button id="lachooser">Language</button>
        <div class="languges" id="languges">
            <h3 id="Amharic">Amharic</h3>
            <h3 id="English">English</h3>
            <h3 id="Oromic">Oromic</h3>
            <h3 id="Tigrinya">Tigrinya</h3>
        </div>
       </div>
    </div>
    
    <div class="menucards">
        <div class="detailcard" id="detailcard">
            <div class="displaycard">
                <img src="" alt="" width="300px" height="150px" id="displaycard_img">
                <div class="txtdisplay">
                    <h2 id="displaycard_h2"></h2>
                    <h3>Ingredients</h3>
                    <ul id="detail">    
                        
                    </ul>
                   <div class="nutrition">
                    <h2>nutrition</h2>
                       <h5 id="displaycard_kcal"></h5>
                       <h5 id="displaycard_pro"></h5>
                       <h5 id="displaycard_car"></h5>
                       <h5 id="displaycard_fat"></h5>
                    </div>
                    <span id="displaycard_price">250</span>
                    <div class="button">
                     <button id="Cancel">Cancel</button>
                    </div>
                </div>
            </div>
           </div>
        <h1 id="menus">MENU</h1>
        <div class="menucatagory">
            <button class="active" id="ALL" data-category="ALL">ALL</button>
            <button id="BURGER" data-category="BURGER">
                <span class="lang-text"
          data-en="BURGER"
          data-am="በርገር"
          data-om="Bargarii"
          data-ti="በርገር">
        BURGER
    </span>
            </button>
            <button id="PIZZA" data-category="PIZZA"><span class="lang-text"
          data-en="PIZZA"
          data-am="ፒዛ"
          data-om="Piizaa"
          data-ti="ፒዛ">
         PIZZA
        </span></button>
            <button id="SALADS" data-category="SALADS"> <span class="lang-text"
          data-en="SALADS"
          data-am="ሰላጣ"
          data-om="Salaaxaa"
          data-ti="ሰላጣ">
        SALADS
    </span></button>
            <button id="ETHIOPIANTRADITIONALFOOD" data-category="ETHIOPIAN TRADITIONAL FOOD"><span class="lang-text"
          data-en="ETHIOPIAN TRADITIONAL FOOD"
          data-am="የኢትዮጵያ ባህላዊ ምግብ"
          data-om="Nyaata Aadaa Itoophiyaa"
          data-ti="ምግቢ ልምዲ ኢትዮጵያ">
        ETHIOPIAN TRADITIONAL FOOD
    </span></button>
            <button id="PASTA&NOODLES" data-category="PASTA & NOODLES"><span class="lang-text"
          data-en="PASTA & NOODLES"
          data-am="ፓስታ እና ኑድል"
          data-om="Paastaa fi Nuudilii"
          data-ti="ፓስታን ኑድልን">
        PASTA & NOODLES
    </span></button>
        </div>
        <div class="cards">
           
        </div>
    </div>
   </div> 
   <script src="js/menu.js"> </script>
</body>
</html>
